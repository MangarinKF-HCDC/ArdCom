<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Product Search - ArdCom Electronics</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <!-- Header Navigation -->
  <header class="site-header">
    <a href="../index.html" class="brand-logo">
      <img src="../Source Image/Landing/ardcom-logo.png" alt="ArdCom Electronics Logo" />
    </a>

    <div style="flex: 1; display: flex; justify-content: center;">
      <div class="search-container" style="margin: 0; max-width: 600px; width: 100%;">
        <div class="search-input-wrapper">
          <input type="text" id="searchInput" placeholder="Search" autocomplete="off" />
          <button id="searchBtn" class="search-button" aria-label="Search">🔍</button>
          <div class="search-suggestions" id="searchSuggestions"></div>
        </div>
      </div>
    </div>

    <nav class="navigation-links" aria-label="Primary navigation">
      <a href="../index.html">Home</a>
      <a href="Shopping.html">Shop</a>
      <a href="#book">Book</a>
      <a href="#about">About</a>
    </nav>

    <div class="header-actions">
      <button class="header-action-button" aria-label="Shopping cart">🛒</button>
      <button class="header-action-button" aria-label="User account">👤</button>
    </div>
  </header>

  <!-- Products Section -->
  <main class="products-section">
    <div class="products-grid search-results-grid" id="productsGrid">
      <div class="no-results-message">Enter a search term and click the search button to find products</div>
    </div>
  </main>
  <script src="../script.js" defer></script>
</body>
</html>
